name: Build Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Signed Release APK
    runs-on: ubuntu-latest

    steps:
      # --- ১. সোর্স কোড সংগ্রহ ---
      - name: Checkout repository
        uses: actions/checkout@v4

      # --- ২. Node / pnpm সেটআপ ---
      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Get pnpm store directory
        id: pnpm-cache
        run: |
          echo "store=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # --- ৩. অ্যান্ড্রয়েডের জন্য ওয়েব অ্যাসেট বিল্ড ---
      - name: Build web assets
        working-directory: artifacts/earthquake-app
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_VAPID_KEY: ${{ secrets.FIREBASE_VAPID_KEY }}
        run: pnpm run build:android

      # --- ৪. অ্যান্ড্রয়েড প্রজেক্টে ওয়েব অ্যাসেট সিঙ্ক ---
      - name: Capacitor sync
        working-directory: artifacts/earthquake-app
        run: npx cap sync android

      # --- ৫. Java ২১ সেটআপ ---
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      # --- ৬. গ্র্যাডল ক্যাশ ---
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('artifacts/earthquake-app/android/**/*.gradle*', 'artifacts/earthquake-app/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # --- ৭. গুগল সার্ভিসেস ফাইল তৈরি ---
      - name: Write google-services.json from secret
        working-directory: artifacts/earthquake-app/android/app
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo "$GOOGLE_SERVICES_JSON" > google-services.json

      # --- ৮. কি-স্টোর ফাইল ডিকোড ---
      - name: Decode keystore from secret
        working-directory: artifacts/earthquake-app/android/app
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > release.keystore

      # --- ৯. সাইনড রিলিজ এপিকে বিল্ড ---
      - name: Build Release APK
        working-directory: artifacts/earthquake-app/android
        env:
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/artifacts/earthquake-app/android/app/release.keystore \
            -Pandroid.injected.signing.store.password=$SIGNING_STORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$SIGNING_KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$SIGNING_KEY_PASSWORD

      # --- ১০. এপিকে আপলোড ---
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: seismon-alert-app-release
          path: artifacts/earthquake-app/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
          if-no-files-found: error
          
