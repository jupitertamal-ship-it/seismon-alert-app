name: Build Debug APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Android Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web assets
        working-directory: artifacts/earthquake-app
        run: pnpm run build:android

      - name: Sync web assets into Android project
        working-directory: artifacts/earthquake-app
        run: npx cap sync android

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      # Google Services JSON ফাইলটি সিক্রেট থেকে তৈরি করা হচ্ছে
      - name: Write google-services.json from secret
        working-directory: artifacts/earthquake-app/android/app
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo "$GOOGLE_SERVICES_JSON" > google-services.json

      - name: Build Debug APK
        working-directory: artifacts/earthquake-app/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: seismon-alert-app-debug
          path: artifacts/earthquake-app/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
          
